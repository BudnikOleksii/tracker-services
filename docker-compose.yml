services:
  postgres:
    image: postgres:15.15-alpine
    container_name: tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracker123}
      POSTGRES_DB: ${POSTGRES_DB:-tracker}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tracker-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tracker}']
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4.3-alpine
    container_name: tracker-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - tracker-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: tracker-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    networks:
      - tracker-network
    depends_on:
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: tracker-api-gateway
    restart: unless-stopped
    profiles: [app]
    env_file: .env.docker
    ports:
      - '3000:3000'
    networks:
      - tracker-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      users-service:
        condition: service_started
      expenses-service:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: tracker-auth-service
    restart: unless-stopped
    profiles: [app]
    env_file: .env.docker
    networks:
      - tracker-network
    depends_on:
      postgres:
        condition: service_healthy

  users-service:
    build:
      context: .
      dockerfile: apps/users-service/Dockerfile
    container_name: tracker-users-service
    restart: unless-stopped
    profiles: [app]
    env_file: .env.docker
    networks:
      - tracker-network
    depends_on:
      postgres:
        condition: service_healthy

  expenses-service:
    build:
      context: .
      dockerfile: apps/expenses-service/Dockerfile
    container_name: tracker-expenses-service
    restart: unless-stopped
    profiles: [app]
    env_file: .env.docker
    networks:
      - tracker-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  tracker-network:
    driver: bridge
